<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Clube Morpheus · Conteúdo</title>
  <link rel="icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,700&display=swap" rel="stylesheet" />
  <style>
    /* ========== RESET + BASE ========== */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: "DM Sans", sans-serif;
      background-color: white;
      color: black;
      display: flex;
      flex-direction: column;
    }

    /* ========== NAVBAR PRINCIPAL (fixa, igual à original) ========== */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: rgba(0, 0, 0, 0.9);
      padding: 10px 20px;
      position: fixed;
      width: 100%;
      top: 0;
      left: 0;
      z-index: 3;
      color: white;
      box-sizing: border-box;
      backdrop-filter: blur(2px);
    }

    .navbar .welcome {
      font-weight: 700;
      white-space: nowrap;
      font-size: 16px;
      letter-spacing: -0.2px;
    }

    .navbar .links {
      display: flex;
      gap: 20px;
      flex-wrap: nowrap;
      white-space: nowrap;
      padding-left: 4px;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      display: inline-block;
      transition: transform 0.2s ease-in-out, opacity 0.2s;
    }

    .navbar a:hover {
      transform: scale(1.08);
      opacity: 0.9;
      color: white;
    }

    /* ===== RESPONSIVE: MOBILE VERTICAL (smartphone) ===== */
    .mobile-device .navbar {
      padding: 18px 20px;
      min-height: 75px;
    }

    .mobile-device .navbar .welcome {
      font-size: 24px;
      font-weight: 700;
    }

    .mobile-device .navbar .links {
      gap: 20px;
    }

    .mobile-device .navbar a {
      font-size: 24px;
      font-weight: 700;
    }

    /* ===== MOBILE LANDSCAPE (rotacionado) ===== */
    .mobile-landscape .navbar {
      padding: 12px 20px;
    }

    .mobile-landscape .navbar .welcome {
      font-size: 18px;
    }

    .mobile-landscape .navbar .links {
      gap: 15px;
    }

    .mobile-landscape .navbar a {
      font-size: 18px;
    }

    /* ===== DESKTOP / TABLET GRANDE ===== */
    .desktop-device .navbar {
      padding: 10px 24px;
    }

    .desktop-device .navbar .welcome {
      font-size: 16px;
    }

    .desktop-device .navbar .links {
      gap: 28px;
    }

    .desktop-device .navbar a {
      font-size: 16px;
    }

    /* ajuste fino para telas médias (fallback) */
    @media (max-width: 768px) {
      .navbar {
        padding: 8px 15px;
      }
      .navbar .welcome {
        font-size: 14px;
      }
      .navbar .links {
        gap: 12px;
      }
      .navbar a {
        font-size: 14px;
      }
    }

    /* ========== ÁREA PRINCIPAL VAZIA (PRONTA PARA SUA CRIAÇÃO) ========== */
    .main-wrapper {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 90px;      /* para compensar navbar fixa */
      box-sizing: border-box;
    }

    /* container limpo, sem nenhum conteúdo pré-definido */
    .blank-slate {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      box-sizing: border-box;
      /* nenhum estilo extra — você constrói do zero */
    }

    /* elemento oculto para debug (não interfere) */
    #deviceInfo {
      display: none !important;
    }
  </style>
</head>
<body>

  <!-- BARRA DE NAVEGAÇÃO COM LINK "CONTEÚDO" (ATIVO NESTA PÁGINA) -->
  <div class="navbar">
    <div class="welcome" id="welcomeUser">Bem-vindo(a)</div>
    <div class="links">
      <a href="dashboard.html">Dashboard</a>
      <a href="lamina.html">Lâmina</a>
      <a href="conteudo.html">Conteúdo</a>   <!-- página atual, link para referência -->
      <a href="minha-area.html">Minha Área</a>
    </div>
  </div>

  <!-- CONTEÚDO TOTALMENTE LIMPO – VOCÊ COMEÇA A MEXER A PARTIR DAQUI -->
  <div class="main-wrapper">
    <div class="blank-slate">
      <!-- NADA AQUI. ADICIONE SEUS COMPONENTES, TEXTO, IMAGENS, FORMULÁRIOS... -->
    </div>
  </div>

  <!-- FIREBASE (APENAS PARA A SAUDAÇÃO NO NAVBAR) – NENHUM OUTRO DADO EXTRA -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
    } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc,
    } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAYLyEfTVl8zR1drcNYi7K33IT6ytVJYJ8",
      authDomain: "login-site-9cbbd.firebaseapp.com",
      projectId: "login-site-9cbbd",
      storageBucket: "login-site-9cbbd.appspot.com",
      messagingSenderId: "703993528666",
      appId: "1:703993528666:web:1e7a02cb5b611e24c97363",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        try {
          const docRef = doc(db, "usuarios", user.uid);
          const docSnap = await getDoc(docRef);

          if (docSnap.exists()) {
            const data = docSnap.data();
            const nome = data.nome || "Usuário";
            const genero = (data.genero || "masculino").toLowerCase();
            const saudacao = genero === "feminino" ? "Bem-vinda" : "Bem-vindo";
            document.getElementById("welcomeUser").textContent = `${saudacao}, ${nome}`;
          } else {
            document.getElementById("welcomeUser").textContent = "Bem-vindo(a), Usuário";
          }
        } catch (error) {
          console.warn("Erro ao carregar nome:", error);
          document.getElementById("welcomeUser").textContent = "Bem-vindo(a), Membro";
        }
      } else {
        // Usuário não autenticado: redireciona para o login
        window.location.href = "index.html";
      }
    });
  </script>

  <!-- SCRIPT DE DETECÇÃO DE DISPOSITIVO (RESPONSIVIDADE DO NAVBAR E LAYOUT) -->
  <script>
    let orientationChangeTimeout;

    function detectarDispositivo() {
      const largura = window.innerWidth;
      const altura = window.innerHeight;
      const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
      
      const isMobileSize = largura <= 1024 || 
                          (largura < altura && largura <= 768) ||
                          (isTouchDevice && (largura <= 1024 || altura <= 1024));

      document.body.classList.remove('desktop-device', 'mobile-device', 'mobile-landscape');

      if (isMobileSize && isTouchDevice) {
        if (largura > altura) {
          document.body.classList.add('mobile-device', 'mobile-landscape');
        } else {
          document.body.classList.add('mobile-device');
        }
      } else {
        document.body.classList.add('desktop-device');
      }
    }

    window.addEventListener('resize', function() {
      clearTimeout(orientationChangeTimeout);
      orientationChangeTimeout = setTimeout(detectarDispositivo, 250);
    });

    window.addEventListener('orientationchange', function() {
      clearTimeout(orientationChangeTimeout);
      orientationChangeTimeout = setTimeout(detectarDispositivo, 500);
    });
    
    // Detecta ao carregar
    setTimeout(detectarDispositivo, 100);
    detectarDispositivo();
  </script>
</body>
</html>
