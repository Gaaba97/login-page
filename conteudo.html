<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Clube Morpheus</title>
  <link rel="icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,700&display=swap" rel="stylesheet" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: "DM Sans", sans-serif;
      background-color: white;
      color: black;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: rgba(0, 0, 0, 0.9);
      padding: 10px 20px;
      position: fixed;
      width: 100%;
      top: 0;
      left: 0;
      z-index: 3;
      color: white;
      box-sizing: border-box;
    }

    .navbar .welcome {
      font-weight: bold;
      white-space: nowrap;
      font-size: 16px;
    }

    .navbar .links {
      display: flex;
      gap: 20px;
      flex-wrap: nowrap;
      white-space: nowrap;
      padding-left: 4px;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;
      display: inline-block;
      transition: transform 0.2s ease-in-out;
    }

    .navbar a:hover {
      transform: scale(1.1);
      color: white;
    }

    /* ESTILOS PARA SMARTPHONE VERTICAL */
    .mobile-device .navbar {
      padding: 18px 20px;
      min-height: 75px;
    }

    .mobile-device .navbar .welcome {
      font-size: 24px;
      font-weight: bold;
    }

    .mobile-device .navbar .links {
      gap: 20px;
    }

    .mobile-device .navbar a {
      font-size: 24px;
      font-weight: bold;
    }

    /* ESTILOS PARA SMARTPHONE HORIZONTAL */
    .mobile-landscape .navbar {
      padding: 12px 20px;
    }

    .mobile-landscape .navbar .welcome {
      font-size: 18px;
    }

    .mobile-landscape .navbar .links {
      gap: 15px;
    }

    .mobile-landscape .navbar a {
      font-size: 18px;
    }

    /* ESTILOS PARA COMPUTADOR (DEFAULT) */
    .desktop-device .navbar {
      padding: 10px 20px;
    }

    .desktop-device .navbar .welcome {
      font-size: 16px;
    }

    .desktop-device .navbar .links {
      gap: 20px;
    }

    .desktop-device .navbar a {
      font-size: 16px;
    }

    @media (max-width: 768px) {
      .navbar {
        padding: 8px 15px;
      }

      .navbar .welcome {
        font-size: 14px;
      }

      .navbar .links {
        gap: 10px;
      }

      .navbar a {
        font-size: 14px;
      }
    }

    /* OCULTAR INFORMAÇÃO DO DISPOSITIVO */
    #deviceInfo {
      display: none !important;
    }

    /* =============================
       ESTILOS DA ÁREA DE CONTEÚDO
       ============================= */
    #conteudo-wrapper {
      margin-top: 60px; /* altura da navbar */
      padding: 30px 20px;
      max-width: 800px;
      width: 100%;
      box-sizing: border-box;
      margin-left: auto;
      margin-right: auto;
    }

    .mobile-device #conteudo-wrapper {
      margin-top: 75px;
      padding: 20px 15px;
    }

    .video-card {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 18px;
      padding: 18px 0;
      text-decoration: none;
      color: black;
      transition: opacity 0.2s ease;
    }

    .video-card:hover {
      opacity: 0.8;
    }

    .video-thumb {
      width: 200px;
      min-width: 200px;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: 6px;
      background-color: #ddd;
    }

    .video-info {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
    }

    .video-titulo {
      font-size: 16px;
      font-weight: 700;
      margin: 0;
      line-height: 1.3;
    }

    .video-descricao {
      font-size: 14px;
      margin: 0;
      color: #444;
      line-height: 1.4;
    }

    .video-data {
      font-size: 12px;
      color: #888;
      margin: 0;
    }

    .video-divider {
      border: none;
      border-top: 1px solid #e0e0e0;
      margin: 0;
    }

    #conteudo-loading {
      text-align: center;
      padding: 40px 0;
      color: #888;
      font-size: 15px;
    }

    #conteudo-erro {
      text-align: center;
      padding: 40px 0;
      color: #c00;
      font-size: 15px;
      display: none;
    }

    /* MOBILE VERTICAL */
    .mobile-device .video-card {
      flex-direction: column;
      gap: 12px;
    }

    .mobile-device .video-thumb {
      width: 100%;
      min-width: unset;
    }

    .mobile-device .video-titulo {
      font-size: 18px;
    }

    .mobile-device .video-descricao {
      font-size: 16px;
    }

    .mobile-device .video-data {
      font-size: 14px;
    }

    /* MOBILE LANDSCAPE */
    .mobile-landscape .video-thumb {
      width: 180px;
      min-width: 180px;
    }

    .mobile-landscape .video-titulo {
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="welcome" id="welcomeUser">Bem-vindo(a)</div>
    <div class="links">
      <a href="dashboard.html">Dashboard</a>
      <a href="lamina.html">Lâmina</a>
      <a href="conteudo.html">Conteúdo</a>
      <a href="minha-area.html">Minha Área</a>
    </div>
  </div>

  <!-- ÁREA DE CONTEÚDO DOS VÍDEOS -->
  <div id="conteudo-wrapper">
    <div id="conteudo-loading">Carregando conteúdos...</div>
    <div id="conteudo-erro">Não foi possível carregar os conteúdos. Tente novamente mais tarde.</div>
    <div id="conteudo-lista"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      signOut,
    } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc,
    } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAYLyEfTVl8zR1drcNYi7K33IT6ytVJYJ8",
      authDomain: "login-site-9cbbd.firebaseapp.com",
      projectId: "login-site-9cbbd",
      storageBucket: "login-site-9cbbd.appspot.com",
      messagingSenderId: "703993528666",
      appId: "1:703993528666:web:1e7a02cb5b611e24c97363",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        try {
          const docRef = doc(db, "usuarios", user.uid);
          const docSnap = await getDoc(docRef);

          if (docSnap.exists()) {
            const data = docSnap.data();
            const nome = data.nome || "Usuário";
            const genero = (data.genero || "masculino").toLowerCase();
            const saudacao = genero === "feminino" ? "Bem-vinda" : "Bem-vindo";
            document.getElementById("welcomeUser").textContent = `${saudacao}, ${nome}`;
          } else {
            document.getElementById("welcomeUser").textContent = "Bem-vindo(a), Usuário";
          }
        } catch (error) {
          document.getElementById("welcomeUser").textContent = "Bem-vindo(a), Usuário";
        }
      } else {
        window.location.href = "index.html";
      }
    });

  </script>

  <!-- SCRIPT DE BUSCA E RENDERIZAÇÃO DOS VÍDEOS -->
  <script>
    const GITHUB_REPO = "Gaaba97/login-page";
    const GITHUB_BRANCH = "main";
    const CONTEUDO_PATH = "conteudo";
    const RAW_BASE = `https://raw.githubusercontent.com/${GITHUB_REPO}/${GITHUB_BRANCH}/${CONTEUDO_PATH}`;
    const API_URL = `https://api.github.com/repos/${GITHUB_REPO}/contents/${CONTEUDO_PATH}?ref=${GITHUB_BRANCH}`;

    function thumbUrl(videoId) {
      return `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
    }

    function youtubeUrl(videoId) {
      return `https://www.youtube.com/watch?v=${videoId}`;
    }

    function formatarData(dataStr) {
      if (!dataStr) return "";
      const [ano, mes, dia] = dataStr.split("-");
      if (!ano || !mes || !dia) return dataStr;
      const meses = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
      return `${parseInt(dia)} de ${meses[parseInt(mes) - 1]} de ${ano}`;
    }

    function renderVideos(videos) {
      const lista = document.getElementById("conteudo-lista");
      document.getElementById("conteudo-loading").style.display = "none";
      lista.innerHTML = "";

      if (!videos || videos.length === 0) {
        lista.innerHTML = '<p style="text-align:center;color:#888;padding:40px 0;">Nenhum conteúdo disponível.</p>';
        return;
      }

      videos.forEach((video, index) => {
        const thumb = (video.thumb && video.thumb.trim() !== "")
          ? video.thumb
          : thumbUrl(video.id);

        const card = document.createElement("a");
        card.href = youtubeUrl(video.id);
        card.target = "_blank";
        card.rel = "noopener noreferrer";
        card.className = "video-card";

        card.innerHTML = `
          <img
            class="video-thumb"
            src="${thumb}"
            alt="${video.titulo || ''}"
            onerror="this.src='https://img.youtube.com/vi/${video.id}/mqdefault.jpg'"
          />
          <div class="video-info">
            <p class="video-titulo">${video.titulo || ""}</p>
            ${video.descricao ? `<p class="video-descricao">${video.descricao}</p>` : ""}
            ${video.data ? `<p class="video-data">${formatarData(video.data)}</p>` : ""}
          </div>
        `;

        lista.appendChild(card);

        // linha divisória após cada vídeo exceto o último
        if (index < videos.length - 1) {
          const hr = document.createElement("hr");
          hr.className = "video-divider";
          lista.appendChild(hr);
        }
      });
    }

    async function carregarVideos() {
      try {
        // 1. Listar arquivos da pasta via GitHub API
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error("Falha ao listar arquivos");

        const arquivos = await res.json();

        // 2. Filtrar apenas .json e ordenar numericamente (maior → menor)
        const jsonFiles = arquivos
          .filter(f => f.name.endsWith(".json") && !isNaN(parseInt(f.name)))
          .sort((a, b) => parseInt(b.name) - parseInt(a.name));

        if (jsonFiles.length === 0) {
          renderVideos([]);
          return;
        }

        // 3. Buscar cada JSON em paralelo
        const promises = jsonFiles.map(f =>
          fetch(`${RAW_BASE}/${f.name}`)
            .then(r => r.ok ? r.json() : null)
            .catch(() => null)
        );

        const resultados = await Promise.all(promises);

        // 4. Achatar e limpar (cada JSON pode ser array ou objeto)
        const videos = resultados
          .filter(Boolean)
          .flatMap(r => Array.isArray(r) ? r : [r])
          .filter(v => v && v.id);

        renderVideos(videos);

      } catch (err) {
        console.error("Erro ao carregar vídeos:", err);
        document.getElementById("conteudo-loading").style.display = "none";
        document.getElementById("conteudo-erro").style.display = "block";
      }
    }

    carregarVideos();
  </script>

  <script>
    // SCRIPT DE DETECÇÃO DE DISPOSITIVO
    let orientationChangeTimeout;

    function detectarDispositivo() {
      const largura = window.innerWidth;
      const altura = window.innerHeight;
      const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
      
      const isMobileSize = largura <= 1024 || 
                          (largura < altura && largura <= 768) ||
                          (isTouchDevice && (largura <= 1024 || altura <= 1024));

      const wasMobileLandscape = document.body.classList.contains('mobile-landscape');
      const isNowMobileLandscape = isMobileSize && isTouchDevice && largura > altura;

      document.body.classList.remove('desktop-device', 'mobile-device', 'mobile-landscape');

      if (isMobileSize && isTouchDevice) {
        if (largura > altura) {
          document.body.classList.add('mobile-device', 'mobile-landscape');
        } else {
          document.body.classList.add('mobile-device');
        }
      } else {
        document.body.classList.add('desktop-device');
      }
    }

    window.addEventListener('resize', function() {
      clearTimeout(orientationChangeTimeout);
      orientationChangeTimeout = setTimeout(detectarDispositivo, 250);
    });

    window.addEventListener('orientationchange', function() {
      clearTimeout(orientationChangeTimeout);
      orientationChangeTimeout = setTimeout(detectarDispositivo, 500);
    });
    
    // Detectar dispositivo ao carregar a página
    setTimeout(detectarDispositivo, 100);
    detectarDispositivo();
  </script>
</body>
</html>
