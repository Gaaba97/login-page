<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Clube Morpheus</title>
  <link rel="icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,700&display=swap" rel="stylesheet" />
  <style>
    /* SEU CSS ORIGINAL - NADA MUDOU */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: "DM Sans", sans-serif;
      background-color: white;
      color: black;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: rgba(0, 0, 0, 0.9);
      padding: 10px 20px;
      position: fixed;
      width: 100%;
      top: 0;
      left: 0;
      z-index: 3;
      color: white;
      box-sizing: border-box;
    }

    .navbar .welcome {
      font-weight: bold;
      white-space: nowrap;
      font-size: 16px;
    }

    .navbar .links {
      display: flex;
      gap: 20px;
      flex-wrap: nowrap;
      white-space: nowrap;
      padding-left: 4px;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;
      display: inline-block;
      transition: transform 0.2s ease-in-out;
    }

    .navbar a:hover {
      transform: scale(1.1);
      color: white;
    }

    /* ESTILOS PARA SMARTPHONE VERTICAL */
    .mobile-device .navbar {
      padding: 18px 20px;
      min-height: 75px;
    }

    .mobile-device .navbar .welcome {
      font-size: 24px;
      font-weight: bold;
    }

    .mobile-device .navbar .links {
      gap: 20px;
    }

    .mobile-device .navbar a {
      font-size: 24px;
      font-weight: bold;
    }

    /* ESTILOS PARA SMARTPHONE HORIZONTAL */
    .mobile-landscape .navbar {
      padding: 12px 20px;
    }

    .mobile-landscape .navbar .welcome {
      font-size: 18px;
    }

    .mobile-landscape .navbar .links {
      gap: 15px;
    }

    .mobile-landscape .navbar a {
      font-size: 18px;
    }

    /* ESTILOS PARA COMPUTADOR (DEFAULT) */
    .desktop-device .navbar {
      padding: 10px 20px;
    }

    .desktop-device .navbar .welcome {
      font-size: 16px;
    }

    .desktop-device .navbar .links {
      gap: 20px;
    }

    .desktop-device .navbar a {
      font-size: 16px;
    }

    @media (max-width: 768px) {
      .navbar {
        padding: 8px 15px;
      }
      .navbar .welcome {
        font-size: 14px;
      }
      .navbar .links {
        gap: 10px;
      }
      .navbar a {
        font-size: 14px;
      }
    }

    /* o resto do seu CSS (tabelas, botões, etc.) permanece igual */
    h2 { margin-bottom: 20px; text-align: center; }
    .main-wrapper { flex:1; display: flex; align-items: center; justify-content: center; padding-top: 80px; box-sizing: border-box; }
    .content { width:90%; max-width:720px; background-color: rgba(0,0,0,0.05); padding:0px 30px 0px 30px; border-radius:12px; border:1px solid #000; color:#000; box-sizing: border-box; }
    table { width:100%; border-collapse: collapse; margin-top:20px; text-align:center; table-layout:fixed; }
    th, td { padding:10px 14px; text-align:center; vertical-align:middle; width:20%; }
    thead th { background-color: black; color: white; }
    tr.highlight { background-color: transparent; }
    tr.highlight td { opacity:1; }
    p { margin-top:20px; font-weight:bold; text-align:center; }
    button { display:block; margin:30px auto 0; padding:12px 24px; background-color:#ccc; color:#000; border:none; font-weight:bold; border-radius:8px; cursor:pointer; transition:background-color 0.3s; }
    button:hover { background-color:#999; }
    #inicioCota { margin-top:4px; font-size:13px; font-style:italic; font-weight:normal; text-align:left; }
    #deviceInfo { display: none !important; }
  </style>
</head>
<body>

    <div class="links">
      <a href="dashboard.html">Dashboard</a>

      <a href="conteudo.html">Conteúdo</a>   <!-- ÚNICA ADIÇÃO -->
      <a href="minha-area.html">Minha Área</a>
    </div>
  </div>

  <div class="main-wrapper">
    <div class="content">
      <h2>Rentabilidade</h2>
      <table>... (sua tabela original) ...</table>
      <p id="cotaValor">Cota: ...</p>
      <p id="inicioCota"><i>* Início em 01/07/2025</i></p>
    </div>
  </div>

</body>
</html>
